# CI: build + unit tests on every PR + push to main / refactor branches.
#
# What runs:
# - npm test     — Vitest suite for pure helpers (escHtml, safeUrl,
#                  convertDriveUrl, formatThaiDate, decodeJwtResponse).
#                  Cheap (~150 ms) and catches regressions in the
#                  security-critical escape/url-sanitize helpers.
# - npm run build — Vite, fails on syntax / module-resolution errors.
#
# Cloudflare Pages also builds on push; this CI gives a faster signal
# on PRs and is what GitHub's required-status-check rule on `main`
# protects against.
#
# Linting / formatting are deferred until a real style disagreement
# exists between contributors.

name: build

on:
  push:
    branches: [main, refactor/modular]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # We don't need real env vars at build time; Vite's import.meta.env
      # access doesn't fail if vars are missing — db.js only logs a warning.
      - run: npm test
      - run: npm run build

      <!-- TAB 3: ANNOUNCEMENT CREATOR -->
      <div class="tab-pane fade" id="pills-creator" role="tabpanel">
        <div class="form-container" style="max-width: 900px">
          <div class="text-center mb-4">
            <h2 class="page-header" id="creatorPageHeader"><i
                class="bi bi-layout-text-window-reverse me-2 text-pink-custom"></i> เขียนประกาศลงเว็บไซต์</h2>
            <p class="text-muted" id="creatorPageDesc">เขียนเนื้อหา แทรกรูปภาพ แล้ว Publish ขึ้นบอร์ดประกาศได้ทันที</p>
          </div>
          <div id="creatorAlert" class="alert d-none shadow-sm"></div>
          <div class="row g-3 mb-4">
            <div class="col-md-8">
              <label class="form-label fw-bold">หัวข้อประกาศ (Title) <span class="text-danger">*</span></label>
              <input type="text" id="creatorTitle" class="form-control" placeholder="ระบุหัวข้อที่น่าสนใจ..." />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">ฝ่ายที่ประกาศ (Department) <span class="text-danger">*</span></label>
              <select id="creatorDepartment" class="form-select">
                <option value="สโมสรนักศึกษา" selected>สโมสรนักศึกษา</option>
                <option value="ฝ่ายวิชาการ">ฝ่ายวิชาการ</option>
                <option value="ฝ่ายกิจกรรม">ฝ่ายกิจกรรม</option>
                <option value="ฝ่ายสวัสดิการ">ฝ่ายสวัสดิการ</option>
                <option value="ประกาศทั่วไป">ประกาศทั่วไป</option>
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">เนื้อหา (Content) <span class="text-danger">*</span></label>
            <div class="caption-editor-shell shadow-sm">
              <div id="creatorQuillEditor"></div>
            </div>
            <small class="text-muted mt-2 d-block"><i class="bi bi-image me-1"></i> <strong>Tip:</strong>
              ใช้แถบเครื่องมือด้านบนเพื่อปรับขนาดฟอนต์ จัดหน้า และแทรกรูปลิ้งก์ได้เลย</small>
          </div>
          <div class="d-flex gap-2">
            <button onclick="publishAnnouncement()" class="btn btn-submit flex-grow-1 btn-lg"><span
                id="publishBtnText"><i class="bi bi-cloud-arrow-up-fill me-2"></i> Publish
                (เผยแพร่ลงเว็บไซต์)</span></button>
            <button onclick="cancelEdit()" id="cancelEditBtn"
              class="btn btn-outline-secondary btn-lg d-none">ยกเลิก</button>
          </div>
        </div>
      </div>

      <!-- TAB 3: ANNOUNCEMENT CREATOR -->
      <div class="tab-pane fade an-tab" id="pills-creator" role="tabpanel">
        <div class="form-container" style="max-width: 900px; --form-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);">
          <div class="text-center mb-4">
            <h2 class="page-header" id="creatorPageHeader"><i
                class="bi bi-layout-text-window-reverse me-2 text-pink-custom"></i> เขียนประกาศลงเว็บไซต์</h2>
            <p class="text-muted" id="creatorPageDesc">เขียนเนื้อหา แทรกรูปภาพ แล้ว Publish ขึ้นบอร์ดประกาศได้ทันที</p>
          </div>
          <div id="creatorAlert" class="alert d-none shadow-sm"></div>
          <div class="row g-3 mb-4">
            <div class="col-md-8">
              <label class="form-label fw-bold">หัวข้อประกาศ (Title) <span class="text-danger">*</span></label>
              <input type="text" id="creatorTitle" class="form-control" placeholder="ระบุหัวข้อที่น่าสนใจ..." />
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">ฝ่ายที่ประกาศ (Department) <span class="text-danger">*</span></label>
              <select id="creatorDepartment" class="form-select">
                <option value="สโมสรนักศึกษา" selected>สโมสรนักศึกษา</option>
                <option value="ฝ่ายวิชาการ">ฝ่ายวิชาการ</option>
                <option value="ฝ่ายกิจกรรม">ฝ่ายกิจกรรม</option>
                <option value="ฝ่ายสวัสดิการ">ฝ่ายสวัสดิการ</option>
                <option value="ประกาศทั่วไป">ประกาศทั่วไป</option>
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">รูปปก (Thumbnail) <span class="text-muted small">— แสดงในการ์ดประกาศ
              (ไม่บังคับ)</span></label>
            <div class="creator-thumb">
              <div class="creator-thumb-preview" id="creatorThumbPreview">
                <i class="bi bi-image fs-1"></i>
                <span class="text-muted small mt-2">ยังไม่ได้เลือกรูปปก</span>
              </div>
              <div class="creator-thumb-actions">
                <input type="file" id="creatorThumbInput" accept="image/*" class="d-none"
                  onchange="onCreatorThumbPicked(event)">
                <button type="button" class="btn btn-outline-secondary btn-sm"
                  onclick="document.getElementById('creatorThumbInput').click()">
                  <i class="bi bi-upload me-1"></i> เลือกรูป
                </button>
                <button type="button" class="btn btn-outline-danger btn-sm d-none" id="creatorThumbClearBtn"
                  onclick="clearCreatorThumb()">
                  <i class="bi bi-x-lg me-1"></i> ลบรูปปก
                </button>
              </div>
            </div>
            <input type="hidden" id="creatorThumbUrl" value="">
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">เนื้อหา (Content) <span class="text-danger">*</span></label>
            <div class="caption-editor-shell shadow-sm">
              <div id="creatorQuillEditor"></div>
            </div>
            <small class="text-muted mt-2 d-block"><i class="bi bi-image me-1"></i> <strong>Tip:</strong>
              คลิกไอคอนรูปในแถบเครื่องมือเพื่อแทรกรูปในเนื้อหา (ระบบจะอัปโหลดให้อัตโนมัติ)</small>
          </div>
          <div class="d-flex gap-2">
            <button id="publishBtn" onclick="publishAnnouncement()" class="btn btn-submit flex-grow-1 btn-lg" style="--btn-shadow: 0 4px 14px rgba(15, 23, 42, 0.08); --btn-hover-shadow: 0 10px 24px rgba(15, 23, 42, 0.15);"><span
                id="publishBtnText"><i class="bi bi-cloud-arrow-up-fill me-2"></i> Publish
                (เผยแพร่ลงเว็บไซต์)</span></button>
            <button onclick="cancelEdit()" id="cancelEditBtn"
              class="btn btn-outline-secondary btn-lg d-none">ยกเลิก</button>
          </div>
        </div>
      </div>

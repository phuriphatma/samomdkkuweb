  <!-- Send-to-professor (signing request) modal — src/js/projects/sign.js -->
  <div class="modal fade projects-tab" id="projectSignModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold"><i class="bi bi-pen me-2"></i>ส่งให้อาจารย์ลงนาม</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="ปิด"></button>
        </div>
        <form id="projectSignForm" class="modal-body" novalidate>
          <div class="alert alert-light border d-flex align-items-center gap-2 small mb-3" role="alert">
            <i class="bi bi-file-earmark-text fs-5 text-success"></i>
            <div>
              <div class="text-muted" style="font-size: 0.78rem;">เลือกไฟล์จากหนังสือ</div>
              <div class="fw-bold" id="projectSignDocLabel">—</div>
            </div>
          </div>

          <label class="form-label fw-bold">ไฟล์ที่จะส่งให้ลงนาม <span class="text-danger">*</span></label>
          <div id="projectSignFileList" class="projects-sign-picklist"></div>

          <div class="mt-3">
            <label class="form-label small">โน้ตถึงอาจารย์ (ถ้ามี)</label>
            <textarea class="form-control" id="projectSignNote" rows="2" maxlength="500"
              placeholder="เช่น รบกวนอาจารย์ลงนามในเอกสารแนบ"></textarea>
          </div>

          <div class="projects-send-status small text-danger mt-3" id="projectSignStatus"></div>
        </form>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="submit" form="projectSignForm" id="projectSignSubmit" class="btn btn-success">
            <i class="bi bi-send me-1"></i> ส่งให้อาจารย์
          </button>
        </div>
      </div>
    </div>
  </div>

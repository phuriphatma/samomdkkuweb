  <!-- Sign-in modal — two screens: Login (with Google + username/password) and Register -->
  <div class="modal fade" id="signinModal" tabindex="-1" aria-labelledby="signinModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="signinModalLabel">
            <span class="brand-mdkku">MDKKU</span><span class="brand-samo">SAMO</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4 pt-2">

          <!-- ====== LOGIN SCREEN ====== -->
          <div id="signinLoginScreen">
            <h6 class="fw-bold mb-3 text-center">เข้าสู่ระบบ</h6>

            <form id="signinLoginForm" onsubmit="event.preventDefault(); samoPasswordSignIn();">
              <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" class="form-control" id="signinLoginUsername" autocomplete="username"
                  placeholder="ชื่อผู้ใช้ของคุณ" required>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" class="form-control" id="signinLoginPassword" autocomplete="current-password"
                  placeholder="รหัสผ่าน" required>
              </div>
              <div id="signinLoginAlert" class="alert alert-danger small py-2 d-none mb-3"></div>
              <button type="submit" class="btn btn-custom w-100" id="signinLoginBtn">
                <i class="bi bi-box-arrow-in-right me-1"></i> เข้าสู่ระบบ
              </button>
            </form>

            <div class="signin-divider my-4">
              <span>หรือ</span>
            </div>

            <div class="d-flex justify-content-center mb-2">
              <div class="g_id_signin"
                data-type="standard"
                data-shape="pill"
                data-theme="outline"
                data-text="continue_with"
                data-size="large"
                data-logo_alignment="left"></div>
            </div>

            <p class="text-muted small mt-4 mb-0 text-center">
              ยังไม่มีบัญชี?
              <a href="#" class="fw-bold text-decoration-none" style="color: var(--brand-primary);"
                onclick="event.preventDefault(); samoShowSigninScreen('register');">
                สมัครสมาชิก
              </a>
            </p>
          </div>

          <!-- ====== REGISTER SCREEN ====== -->
          <div id="signinRegisterScreen" class="d-none">
            <h6 class="fw-bold mb-3 text-center">สมัครสมาชิก</h6>

            <form id="signinRegisterForm" onsubmit="event.preventDefault(); samoPasswordRegister();">
              <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" class="form-control" id="signinRegisterUsername" autocomplete="username"
                  placeholder="อย่างน้อย 3 ตัวอักษร" required minlength="3">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" class="form-control" id="signinRegisterPassword" autocomplete="new-password"
                  placeholder="อย่างน้อย 4 ตัวอักษร" required minlength="4">
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold">Confirm Password</label>
                <input type="password" class="form-control" id="signinRegisterConfirm" autocomplete="new-password"
                  placeholder="กรอกรหัสผ่านอีกครั้ง" required>
              </div>
              <div id="signinRegisterAlert" class="alert alert-danger small py-2 d-none mb-3"></div>
              <button type="submit" class="btn btn-custom w-100" id="signinRegisterBtn">
                <i class="bi bi-person-plus me-1"></i> สมัครสมาชิก
              </button>
            </form>

            <p class="text-muted small mt-4 mb-0 text-center">
              มีบัญชีอยู่แล้ว?
              <a href="#" class="fw-bold text-decoration-none" style="color: var(--brand-primary);"
                onclick="event.preventDefault(); samoShowSigninScreen('login');">
                เข้าสู่ระบบ
              </a>
            </p>
          </div>

        </div>
      </div>
    </div>
  </div>

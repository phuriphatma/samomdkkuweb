  <!-- Admin: order detail modal (rendered into by src/js/shop/admin.js) -->
  <div class="modal fade shop-tab" id="shopAdminOrderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <div class="text-muted small font-mono" id="shopAdminOrderModalId"></div>
            <h5 class="modal-title font-prompt" style="font-weight:700;">รายละเอียดคำสั่งซื้อ</h5>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="shopAdminOrderModalBody">
          <!-- Filled by JS: customer block, items list, slip preview,
               status picker, internal notes textarea. -->
        </div>
        <div class="modal-footer flex-wrap gap-2">
          <!-- Hard-delete (RLS-gated to shop admins). -->
          <button type="button" class="btn btn-outline-danger me-auto" id="shopAdminOrderModalDelete">
            <i class="bi bi-trash3 me-1"></i> ลบคำสั่งซื้อ
          </button>
          <button type="button" class="btn btn-link text-muted d-none" id="shopAdminOrderModalResetStatus">
            ยกเลิกการเปลี่ยนแปลง
          </button>
          <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">ปิด</button>
          <!-- Confirm-button workflow: chip clicks stage a status change,
               this button writes it. Disabled until a different chip is picked. -->
          <button type="button" class="btn btn-outline-secondary" id="shopAdminOrderModalSave" disabled>
            <i class="bi bi-check2 me-1"></i> ไม่มีการเปลี่ยนแปลง
          </button>
        </div>
      </div>
    </div>
  </div>

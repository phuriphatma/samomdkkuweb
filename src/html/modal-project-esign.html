  <!-- In-browser PDF e-sign modal — src/js/projects/esign.js -->
  <div class="modal fade projects-tab" id="projectEsignModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold"><i class="bi bi-pen me-2"></i>ลงนามเอกสาร</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="ปิด"></button>
        </div>
        <div class="modal-body">
          <div id="esignLoading" class="text-center py-5">
            <div class="spinner-border text-success"></div>
            <div class="mt-2 small text-muted">กำลังโหลดเอกสาร…</div>
          </div>
          <div id="esignError" class="alert alert-danger d-none"></div>

          <div id="esignWork" class="d-none esign-layout">
            <div class="esign-main">
              <div class="esign-toolbar">
                <div class="btn-group btn-group-sm">
                  <button type="button" class="btn btn-ghost" id="esignPrev" title="หน้าก่อนหน้า"><i class="bi bi-chevron-left"></i></button>
                  <span class="esign-page-label" id="esignPageLabel">1 / 1</span>
                  <button type="button" class="btn btn-ghost" id="esignNext" title="หน้าถัดไป"><i class="bi bi-chevron-right"></i></button>
                </div>
                <div class="esign-page-controls d-none" id="esignPageControls">
                  <button type="button" class="btn btn-sm btn-primary-soft" id="esignThisPage" title="วาง/เอาลายเซ็นออกจากหน้านี้">
                    <i class="bi bi-pen me-1"></i><span id="esignThisPageLabel">ลงนามหน้านี้</span>
                  </button>
                  <button type="button" class="btn btn-sm btn-ghost" id="esignAllPages" title="วางลายเซ็นทุกหน้า">
                    <i class="bi bi-files me-1"></i>ทุกหน้า
                  </button>
                  <span class="small text-muted ms-1" id="esignSignedCount"></span>
                </div>
                <div class="esign-size-wrap d-none" id="esignSizeWrap">
                  <label class="small text-muted me-2"><i class="bi bi-arrows-angle-expand me-1"></i>ขนาด</label>
                  <input type="range" id="esignSize" min="60" max="360" value="170" />
                </div>
              </div>
              <div class="esign-stage" id="esignStage">
                <canvas id="esignPageCanvas"></canvas>
                <img id="esignSigOverlay" class="esign-sig-overlay d-none" alt="ลายเซ็น" draggable="false" />
              </div>
              <div class="small text-muted mt-1" id="esignHint">วาดลายเซ็นด้านขวา แล้วกด "ใช้ลายเซ็นนี้" จากนั้นลากไปวางบนเอกสาร</div>
            </div>

            <div class="esign-side">
              <div class="small fw-bold mb-1">วาดลายเซ็น</div>
              <canvas id="esignPad" class="esign-pad" width="320" height="150"></canvas>
              <div class="d-flex gap-2 mt-2">
                <button type="button" class="btn btn-sm btn-ghost" id="esignClearPad"><i class="bi bi-eraser me-1"></i>ล้าง</button>
                <button type="button" class="btn btn-sm btn-primary-soft flex-grow-1" id="esignUseSig"><i class="bi bi-check2 me-1"></i>ใช้ลายเซ็นนี้</button>
              </div>
              <hr />
              <div class="small text-muted">
                หรือถ้าต้องการเซ็นบนอุปกรณ์เอง ให้ปิดหน้าต่างนี้แล้วใช้ปุ่ม
                "อัปโหลดไฟล์ที่เซ็นแล้ว"
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="button" class="btn btn-success" id="esignConfirm" disabled>
            <i class="bi bi-pen me-1"></i> ยืนยันลงนาม
          </button>
        </div>
      </div>
    </div>
  </div>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDKKU SAMO - PR Form</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts: Prompt -->
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
    body { 
      background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
      padding: 2rem 1rem; 
      font-family: 'Prompt', sans-serif;
      min-height: 100vh;
      color: #334155;
    }
    .form-container { 
      background: #ffffff; 
      padding: 2.5rem; 
      border-radius: 20px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
      max-width: 800px; 
      margin: auto; 
    }
    .page-header {
      color: #1e3a8a;
      font-weight: 600;
    }
    .section-title { 
      margin-top: 2rem; 
      margin-bottom: 1.25rem; 
      color: #2563eb; 
      font-size: 1.25rem;
      font-weight: 600;
      border-bottom: 2px solid #eff6ff; 
      padding-bottom: 10px; 
    }
    .form-label {
      font-weight: 500;
      color: #475569;
      margin-bottom: 0.5rem;
    }
    .form-control, .form-select {
      border-radius: 10px;
      padding: 0.7rem 1rem;
      border: 1.5px solid #e2e8f0;
      background-color: #f8fafc;
      transition: all 0.2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: #3b82f6;
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    
    /* -----------------------------------------
       Modern Radio Cards (แทนที่ Radio แบบเดิม)
    ------------------------------------------ */
    .radio-card-label {
      display: block;
      width: 100%;
      text-align: left;
      padding: 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background-color: #ffffff;
      color: #475569;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .radio-card-label:hover {
      border-color: #cbd5e1;
      background-color: #f8fafc;
    }
    .btn-check:checked + .radio-card-label {
      border-color: #3b82f6;
      background-color: #eff6ff;
      color: #1d4ed8;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
    }
    .btn-check:checked + .radio-card-label .check-icon {
      color: #3b82f6;
      opacity: 1;
      transform: scale(1);
    }
    .check-icon {
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s ease;
    }

    /* -----------------------------------------
       Modern Pill Tags (แทนที่ Checkbox แบบเดิม)
    ------------------------------------------ */
    .pill-checkbox-label {
      border-radius: 50px;
      padding: 0.5rem 1.2rem;
      border: 1.5px solid #e2e8f0;
      color: #64748b;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s ease;
      background-color: #ffffff;
    }
    .pill-checkbox-label:hover {
      background-color: #f8fafc;
      border-color: #cbd5e1;
    }
    .btn-check:checked + .pill-checkbox-label.ig {
      background-color: #fff1f2; border-color: #e11d48; color: #e11d48;
    }
    .btn-check:checked + .pill-checkbox-label.fb {
      background-color: #eff6ff; border-color: #2563eb; color: #2563eb;
    }
    .btn-check:checked + .pill-checkbox-label.line {
      background-color: #f0fdf4; border-color: #16a34a; color: #16a34a;
    }
    .btn-check:checked + .pill-checkbox-label.other {
      background-color: #f8fafc; border-color: #475569; color: #475569;
    }

    /* ตกแต่งปุ่ม Submit */
    .btn-submit {
      border-radius: 10px;
      padding: 0.8rem;
      font-size: 1.1rem;
      font-weight: 500;
      box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
      transition: all 0.3s ease;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3);
    }
  </style>
</head>
<body>

<div class="form-container">
  <div class="text-center mb-5">
    <h2 class="page-header"><i class="bi bi-megaphone-fill me-2 text-primary"></i>MDKKU PR Form</h2>
    <p class="text-muted">ระบบสั่งงานและฝากประชาสัมพันธ์ สโมสรนักศึกษา</p>
  </div>
  
  <div id="alertBox" class="alert d-none shadow-sm"></div>

  <form id="prForm">
    <!-- ข้อมูลผู้ส่งงาน -->
    <h4 class="section-title"><i class="bi bi-person-badge me-2"></i>ข้อมูลผู้ส่งงาน</h4>
    <div class="row mb-4 g-3">
      <div class="col-md-6">
        <label class="form-label">ฝ่าย (Department) <span class="text-danger">*</span></label>
        <select name="department" class="form-select" required>
          <option value="" disabled selected>เลือกฝ่ายของคุณ</option>
          <option value="ฝ่ายบริหารองค์กร">ฝ่ายบริหารองค์กร</option>
          <option value="ฝ่ายดิจิทัลและสื่อสารองค์กร">ฝ่ายดิจิทัลและสื่อสารองค์กร</option>
          <option value="ฝ่ายกิจการภายใน">ฝ่ายกิจการภายใน</option>
          <option value="ฝ่ายกิจการภายนอก">ฝ่ายกิจการภายนอก</option>
          <option value="ฝ่ายกิจการมหาวิทยาลัย">ฝ่ายกิจการมหาวิทยาลัย</option>
          <option value="ฝ่ายวิชาการ">ฝ่ายวิชาการ</option>
          <option value="ฝ่ายยุทธศาสตร์และพัฒนาองค์กร">ฝ่ายยุทธศาสตร์และพัฒนาองค์กร</option>
          <option value="ฝ่ายคุณภาพขีวิตและสิ่งแวดล้อม">ฝ่ายคุณภาพขีวิตและสิ่งแวดล้อม</option>
          <option value="ฝ่ายเวชนิทัศน์">ฝ่ายเวชนิทัศน์</option>
          <option value="โครงการอื่นๆ">โครงการอื่นๆ</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">ช่องทางติดต่อ (IG/Line) <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-chat-dots"></i></span>
          <input type="text" name="contact" class="form-control border-start-0 ps-0" placeholder="เช่น Ig: pukanpts" required>
        </div>
      </div>
    </div>

    <!-- รายละเอียดงาน -->
    <h4 class="section-title"><i class="bi bi-card-checklist me-2"></i>รายละเอียดงาน</h4>
    <div class="mb-4">
      <label class="form-label">ชื่องาน / Content <span class="text-danger">*</span></label>
      <input type="text" name="content" class="form-control" placeholder="ระบุชื่องานที่ต้องการโปรโมท" required>
    </div>
    
    <div class="row mb-4 g-4">
      <!-- Modern Radio Cards: Job Type -->
      <div class="col-md-6">
        <label class="form-label">รูปแบบงาน (Job Type) <span class="text-danger">*</span></label>
        <div class="d-grid gap-2">
          <div>
            <input class="btn-check" type="radio" name="jobType" id="jobType1" value="New content" required>
            <label class="radio-card-label" for="jobType1">
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold"><i class="bi bi-magic me-2"></i>New content</span>
                <i class="bi bi-check-circle-fill check-icon fs-5"></i>
              </div>
              <small class="text-muted mt-1 d-block">ให้ทีม PR ช่วยสร้างสรรค์สื่อให้ใหม่</small>
            </label>
          </div>
          <div>
            <input class="btn-check" type="radio" name="jobType" id="jobType2" value="Ready to post" required>
            <label class="radio-card-label" for="jobType2">
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold"><i class="bi bi-image me-2"></i>Ready to post</span>
                <i class="bi bi-check-circle-fill check-icon fs-5"></i>
              </div>
              <small class="text-muted mt-1 d-block">มีรูปภาพ/สื่อพร้อมสำหรับลงโพสต์แล้ว</small>
            </label>
          </div>
        </div>
      </div>

      <!-- Modern Radio Cards: Posting Channel -->
      <div class="col-md-6">
        <label class="form-label">ช่องทางการโพสต์ <span class="text-danger">*</span></label>
        <div class="d-grid gap-2">
          <div>
            <input class="btn-check" type="radio" name="postingChannel" id="postChan1" value="Only Account ฝ่าย" required>
            <label class="radio-card-label py-2" for="postChan1">
              <div class="d-flex justify-content-between align-items-center">
                <span><i class="bi bi-person-fill me-2"></i>Account ฝ่ายเท่านั้น</span>
                <i class="bi bi-check-circle-fill check-icon fs-5"></i>
              </div>
            </label>
          </div>
          <div>
            <input class="btn-check" type="radio" name="postingChannel" id="postChan2" value="Account ฝ่าย & co-post with mdkkusamo account" required>
            <label class="radio-card-label py-2" for="postChan2">
              <div class="d-flex justify-content-between align-items-center">
                <span><i class="bi bi-people-fill me-2"></i>Account ฝ่าย & Co-post กับ SAMO</span>
                <i class="bi bi-check-circle-fill check-icon fs-5"></i>
              </div>
            </label>
          </div>
          <div>
            <input class="btn-check" type="radio" name="postingChannel" id="postChan3" value="Only mdkkusamo account" required>
            <label class="radio-card-label py-2" for="postChan3">
              <div class="d-flex justify-content-between align-items-center">
                <span><i class="bi bi-megaphone-fill me-2"></i>Account MDKKU SAMO เท่านั้น</span>
                <i class="bi bi-check-circle-fill check-icon fs-5"></i>
              </div>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Modern Checkbox Pills: Platform -->
    <div class="mb-4">
      <label class="form-label">แพลตฟอร์ม (เลือกได้มากกว่า 1) <span class="text-danger">*</span></label>
      <div class="d-flex flex-wrap gap-2">
        <input type="checkbox" class="btn-check" name="platform" id="plat1" value="Ig post">
        <label class="pill-checkbox-label ig shadow-sm" for="plat1"><i class="bi bi-instagram me-1"></i> IG Post</label>
        
        <input type="checkbox" class="btn-check" name="platform" id="plat2" value="Ig story">
        <label class="pill-checkbox-label ig shadow-sm" for="plat2"><i class="bi bi-instagram me-1"></i> IG Story</label>
        
        <input type="checkbox" class="btn-check" name="platform" id="plat3" value="Facebook mdkkusamo">
        <label class="pill-checkbox-label fb shadow-sm" for="plat3"><i class="bi bi-facebook me-1"></i> Facebook</label>
        
        <input type="checkbox" class="btn-check" name="platform" id="plat4" value="Line กลุ่มชั้นปี">
        <label class="pill-checkbox-label line shadow-sm" for="plat4"><i class="bi bi-line me-1"></i> Line กลุ่มชั้นปี</label>
        
        <input type="checkbox" class="btn-check" name="platform" id="plat5" value="Other university">
        <label class="pill-checkbox-label other shadow-sm" for="plat5"><i class="bi bi-globe me-1"></i> Other university</label>
      </div>
    </div>

    <!-- กำหนดการ -->
    <h4 class="section-title"><i class="bi bi-calendar-event me-2"></i>กำหนดการ</h4>
    <div class="row mb-4 p-4 rounded-4 mx-0" style="background-color: #f8fafc; border: 1px solid #e2e8f0;">
      <div class="col-md-7 px-0 pe-md-3">
        <label class="form-label">วันที่และเวลาที่ต้องการลงประชาสัมพันธ์ <span class="text-danger">*</span></label>
        <input type="datetime-local" name="publishDate" id="publishDate" class="form-control bg-white" required>
        <small class="text-muted mt-2 d-block" id="dateHelper"><i class="bi bi-info-circle me-1"></i>ต้องไม่เร็วกว่า 15 วันนับจากวันนี้</small>
      </div>
      <div class="col-md-5 px-0 d-flex align-items-center mt-3 mt-md-0 border-start ps-md-4">
        <div class="form-check form-switch fs-5 mb-0">
          <input class="form-check-input shadow-sm" type="checkbox" name="rushJob" value="งานด่วน" id="rushJob" style="cursor: pointer;">
          <label class="form-check-label text-danger fw-bold fs-6 mt-1 ms-2" for="rushJob" style="cursor: pointer;">
            🔥 แจ้งงานด่วน 
            <br><small class="text-muted fw-normal fs-6">(โควตา 1 ครั้ง/เดือน/ฝ่าย)</small>
          </label>
        </div>
      </div>
    </div>

    <!-- เนื้อหาและไฟล์แนบ -->
    <h4 class="section-title"><i class="bi bi-folder2-open me-2"></i>เนื้อหาและไฟล์แนบ</h4>
    <div class="mb-3">
      <label class="form-label">Brief (บรีฟการออกแบบ)</label>
      <textarea name="brief" class="form-control" rows="2" placeholder="อธิบายแนวทาง โทนสี หรือ Mood & Tone ที่ต้องการ"></textarea>
    </div>
    <div class="mb-4">
      <label class="form-label">Caption (ข้อความแคปชั่น)</label>
      <textarea name="caption" class="form-control" rows="3" placeholder="ข้อความที่ต้องการให้ฝากโพสต์ พร้อมแฮชแท็ก (ถ้ามี)"></textarea>
    </div>
    
    <div class="p-4 rounded-4 mb-4" style="background-color: #f0fdfa; border: 1.5px dashed #14b8a6;">
      <label class="form-label fw-bold text-teal-700" style="color: #0f766e;"><i class="bi bi-cloud-arrow-up-fill me-2"></i>อัปโหลดไฟล์งาน (สูงสุด 35MB)</label>
      <input type="file" name="fileUpload" id="fileUpload" class="form-control bg-white mb-3">
      
      <div>
        <label class="form-label mb-1 text-teal-700" style="color: #0f766e;">หรือแปะลิงก์ Google Drive</label>
        <small class="text-muted d-block mb-2">กรณีไฟล์ใหญ่กว่า 35MB หรือเป็นแชร์โฟลเดอร์</small>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-link-45deg fs-5"></i></span>
          <input type="url" name="largeFileLink" id="largeFileLink" class="form-control border-start-0 ps-0 bg-white" placeholder="https://drive.google.com/...">
        </div>
      </div>
    </div>

    <!-- โหมดเงียบ -->
    <div class="form-check form-switch mt-4 mb-4 p-3 rounded-3" style="background-color: #f1f5f9;">
      <input class="form-check-input ms-0 me-3 shadow-sm" type="checkbox" id="silentNotify" name="silentNotify" value="true" style="cursor: pointer;">
      <label class="form-check-label text-secondary mt-1" for="silentNotify" style="cursor: pointer;">
        <i class="bi bi-bell-slash-fill me-1"></i> ส่งแจ้งเตือนเข้า Discord แบบ Silent (ไม่เด้งเตือนเสียงดังรบกวน)
      </label>
    </div>

    <!-- ปุ่ม Submit -->
    <button type="submit" id="submitBtn" class="btn btn-primary btn-submit w-100">
      <span id="btnText"><i class="bi bi-send-fill me-2"></i>ยืนยันการส่งงาน</span>
      <span id="btnLoading" class="d-none">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        กำลังอัปโหลดและส่งข้อมูล...
      </span>
    </button>
  </form>
</div>

<script>
  // --- Date & Time Logic ---
  const dateInput = document.getElementById('publishDate');
  const rushCheckbox = document.getElementById('rushJob');
  const dateHelper = document.getElementById('dateHelper');

  function formatDateTime(date) {
    const pad = n => n.toString().padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
  }

  function applyDateRules(isRush) {
    const now = new Date();
    
    if (isRush) {
      dateInput.min = formatDateTime(now);
      const defaultRushTime = new Date(now.getTime() + 60 * 60 * 1000); 
      dateInput.value = formatDateTime(defaultRushTime);
      dateHelper.innerHTML = "<i class='bi bi-fire me-1'></i> งานด่วน: เลือกเวลาได้ตามต้องการ";
      dateHelper.className = "text-danger mt-2 d-block fw-bold";
    } else {
      const minDate = new Date(now);
      minDate.setDate(minDate.getDate() + 15);
      dateInput.min = formatDateTime(minDate);
      dateInput.value = ""; 
      dateHelper.innerHTML = "<i class='bi bi-info-circle me-1'></i> ต้องไม่เร็วกว่า 15 วันนับจากวันนี้";
      dateHelper.className = "text-muted mt-2 d-block";
    }
  }

  applyDateRules(false);

  rushCheckbox.addEventListener('change', function() {
    applyDateRules(this.checked);
  });

  // --- Form Submission Logic ---
  document.getElementById('prForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoading = document.getElementById('btnLoading');
    const alertBox = document.getElementById('alertBox');
    const fileInput = document.getElementById('fileUpload');
    
    // ⚠️ REPLACE THIS WITH YOUR DEPLOYED GOOGLE APPS SCRIPT URL ⚠️
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwGfg9RQIJ0B4KK1qM3owtfs9HysAQkar_BPOxGAgAgwNQERspxENm6EeO7xDti9-E/exec'; 
    
    btn.disabled = true;
    btnText.classList.add('d-none');
    btnLoading.classList.remove('d-none');
    alertBox.className = 'alert d-none shadow-sm';

    if (fileInput.files.length > 0 && fileInput.files[0].size > 35 * 1024 * 1024) {
      alertBox.classList.remove('d-none');
      alertBox.classList.add('alert-danger');
      alertBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-2"></i> ไฟล์มีขนาดใหญ่เกินไป (สูงสุด 35MB) กรุณาแปะเป็นลิงก์ Google Drive แทนครับ';
      btn.disabled = false;
      btnText.classList.remove('d-none');
      btnLoading.classList.add('d-none');
      return;
    }

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.platform = formData.getAll('platform'); 

    const sendData = async (payload) => {
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        alertBox.classList.remove('d-none');
        
        if(result.success) {
          alertBox.classList.add('alert-success');
          alertBox.innerHTML = `<i class="bi bi-check-circle-fill me-2 fs-5"></i> ${result.message}`;
          document.getElementById('prForm').reset();
          applyDateRules(false); 
        } else {
          alertBox.classList.add('alert-danger');
          alertBox.innerHTML = `<i class="bi bi-x-circle-fill me-2 fs-5"></i> ${result.message}`;
        }
      } catch (error) {
        alertBox.classList.remove('d-none');
        alertBox.classList.add('alert-danger');
        alertBox.innerHTML = '<i class="bi bi-wifi-off me-2 fs-5"></i> เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย กรุณาลองใหม่อีกครั้ง';
      } finally {
        btn.disabled = false;
        btnText.classList.remove('d-none');
        btnLoading.classList.add('d-none');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    };

    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function(event) {
        data.fileData = event.target.result; 
        data.fileName = file.name;
        data.mimeType = file.type;
        sendData(data); 
      };
      reader.readAsDataURL(file); 
    } else {
      sendData(data); 
    }
  });
</script>
</body>
</html>

<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MDKKU SAMO - Portal</title>

  <!-- Bootstrap & Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Quill (For Rich Text Editors) -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

  <!-- App stylesheet — parser-blocking link (not JS-imported) so it loads
       in the first paint, both in dev and production. -->
  <link rel="stylesheet" href="/src/main.css" />


  <!-- Critical inline CSS to avoid FOUC before the Vite bundle + Google Fonts load.
       Covers the body chrome, navbar shell, and brand wordmark — the elements that
       are visible above the fold and would otherwise flash unstyled. -->
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      padding-bottom: 0;
      background:
        radial-gradient(1200px 600px at 0% -10%, rgba(26, 155, 67, 0.05), transparent 60%),
        radial-gradient(900px 500px at 110% 110%, rgba(255, 111, 48, 0.04), transparent 60%),
        linear-gradient(180deg, #fafafa 0%, #f3f4f6 100%);
      color: #334155;
      font-family: "Noto Sans Thai", "Prompt", system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .samo-navbar {
      position: sticky;
      top: 12px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.92);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      backdrop-filter: saturate(180%) blur(14px);
      border: 1px solid rgba(15, 23, 42, 0.05);
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);
      padding: 0.55rem 1.25rem;
      border-radius: 20px;
      margin: 12px;
    }

    .brand-fixed {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .brand-fixed span {
      line-height: 1;
      letter-spacing: 0.5px;
    }

    .brand-mdkku {
      color: #105922;
      font-weight: 700;
      font-size: 1.45rem;
      font-family: "Prompt", sans-serif;
    }

    .brand-samo {
      color: #FF6F30;
      font-weight: 700;
      font-size: 1.45rem;
      font-family: "Prompt", sans-serif;
    }
  </style>
</head>

<body>
  <include src="./src/html/navbar.html" />

  <!-- Tab Content Area -->
  <div class="container-fluid px-4">
    <div class="tab-content" id="pills-tabContent">

      <include src="./src/html/tab-home.html" />

      <include src="./src/html/tab-announcements.html" />

      <include src="./src/html/tab-pr.html" />

      <include src="./src/html/tab-vitalsound.html" />

      <include src="./src/html/tab-shop.html" />

      <include src="./src/html/tab-tools.html" />

      <include src="./src/html/tab-about.html" />

      <include src="./src/html/tab-article.html" />
    </div>
  </div>

  <include src="./src/html/modal-signin.html" />

  <include src="./src/html/modal-profile.html" />

  <include src="./src/html/modal-shop-product.html" />

  <include src="./src/html/modal-shop-order-detail.html" />

  <include src="./src/html/modal-shop-order-qr.html" />

  <include src="./src/html/offcanvas-shop-cart.html" />

  <include src="./src/html/footer.html"/>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Application Module -->
  <script type="module" src="/src/js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDKKU SAMO - PR Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f7fafc; padding: 2rem; font-family: sans-serif; }
    .form-container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
    .section-title { margin-top: 1.5rem; margin-bottom: 1rem; color: #2B6CB0; border-bottom: 2px solid #EDF2F7; padding-bottom: 5px; }
    /* Makes pointers clear on clickable labels */
    .form-check-label { cursor: pointer; } 
  </style>
</head>
<body>

<div class="form-container">
  <h2 class="text-center mb-4">สั่งงานและฝากประชาสัมพันธ์</h2>
  <div id="alertBox" class="alert d-none"></div>

  <form id="prForm">
    <h4 class="section-title">ข้อมูลผู้ส่งงาน</h4>
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">ฝ่าย (Department) *</label>
        <select name="department" class="form-select" required>
          <option value="" disabled selected>เลือกฝ่ายของคุณ</option>
          <option value="ฝ่ายบริหารองค์กร">ฝ่ายบริหารองค์กร</option>
          <option value="ฝ่ายดิจิทัลและสื่อสารองค์กร">ฝ่ายดิจิทัลและสื่อสารองค์กร</option>
          <option value="ฝ่ายกิจการภายใน">ฝ่ายกิจการภายใน</option>
          <option value="ฝ่ายกิจการภายนอก">ฝ่ายกิจการภายนอก</option>
          <option value="ฝ่ายกิจการมหาวิทยาลัย">ฝ่ายกิจการมหาวิทยาลัย</option>
          <option value="ฝ่ายวิชาการ">ฝ่ายวิชาการ</option>
          <option value="ฝ่ายยุทธศาสตร์และพัฒนาองค์กร">ฝ่ายยุทธศาสตร์และพัฒนาองค์กร</option>
          <option value="ฝ่ายคุณภาพขีวิตและสิ่งแวดล้อม">ฝ่ายคุณภาพขีวิตและสิ่งแวดล้อม</option>
          <option value="ฝ่ายเวชนิทัศน์">ฝ่ายเวชนิทัศน์</option>
          <option value="โครงการอื่นๆ">โครงการอื่นๆ</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">ช่องทางติดต่อ (Ig/Line) *</label>
        <input type="text" name="contact" class="form-control" placeholder="เช่น Ig: pukanpts" required>
      </div>
    </div>

    <h4 class="section-title">รายละเอียดงาน</h4>
    <div class="mb-3">
      <label class="form-label">ชื่องาน / Content *</label>
      <input type="text" name="content" class="form-control" required>
    </div>
    
    <div class="mb-3">
      <label class="form-label">Job Type *</label>
      <div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="jobType" id="jobType1" value="New content" required>
          <label class="form-check-label" for="jobType1">New content (ให้ทีม PR สร้างสื่อ)</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="jobType" id="jobType2" value="Ready to post" required>
          <label class="form-check-label" for="jobType2">Ready to post</label>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">ช่องทางการโพสต์ *</label>
      <div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="postingChannel" id="postChan1" value="Only Account ฝ่าย" required>
          <label class="form-check-label" for="postChan1">Only Account ฝ่าย</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="postingChannel" id="postChan2" value="Account ฝ่าย & co-post with mdkkusamo account" required>
          <label class="form-check-label" for="postChan2">Account ฝ่าย & co-post with mdkkusamo account</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="postingChannel" id="postChan3" value="Only mdkkusamo account" required>
          <label class="form-check-label" for="postChan3">Only mdkkusamo account</label>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Platform *</label>
      <div class="d-flex flex-wrap gap-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="platform" id="plat1" value="Ig post">
          <label class="form-check-label" for="plat1">Ig post</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="platform" id="plat2" value="Ig story">
          <label class="form-check-label" for="plat2">Ig story</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="platform" id="plat3" value="Facebook mdkkusamo">
          <label class="form-check-label" for="plat3">Facebook mdkkusamo</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="platform" id="plat4" value="Line กลุ่มชั้นปี">
          <label class="form-check-label" for="plat4">Line กลุ่มชั้นปี</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="platform" id="plat5" value="Other university">
          <label class="form-check-label" for="plat5">Other university</label>
        </div>
      </div>
    </div>

    <h4 class="section-title">กำหนดการ</h4>
    <div class="row mb-3">
      <div class="col-md-7">
        <label class="form-label">วันที่และเวลาที่ต้องการลงประชาสัมพันธ์ *</label>
        <input type="datetime-local" name="publishDate" id="publishDate" class="form-control" required>
        <small class="text-muted" id="dateHelper">ต้องไม่เร็วกว่า 15 วันนับจากวันนี้</small>
      </div>
      <div class="col-md-5 d-flex align-items-center mt-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="rushJob" value="งานด่วน" id="rushJob">
          <label class="form-check-label text-danger fw-bold" for="rushJob">งานด่วน (1 ครั้ง/เดือน/ฝ่าย)</label>
        </div>
      </div>
    </div>

    <h4 class="section-title">เนื้อหาและไฟล์แนบ</h4>
    <div class="mb-3">
      <label class="form-label">Brief</label>
      <textarea name="brief" class="form-control" rows="3" placeholder="บรีฟการออกแบบ หรือแนวทางที่ต้องการ"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Caption</label>
      <textarea name="caption" class="form-control" rows="3" placeholder="Caption / ข้อความที่ฝากลง"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">อัปโหลดไฟล์ (สูงสุด 35MB)</label>
      <input type="file" name="fileUpload" id="fileUpload" class="form-control mb-2">
      <small class="text-muted">หากไฟล์ใหญ่กว่า 35MB กรุณาแปะลิงก์ Google Drive ในช่องด้านล่างแทน</small>
      <input type="url" name="largeFileLink" id="largeFileLink" class="form-control mt-2" placeholder="ลิงก์ไฟล์งาน (กรณีไฟล์ใหญ่กว่า 35MB หรือเป็นแนบโฟลเดอร์)">
    </div>

    <div class="form-check form-switch mt-4 mb-2">
      <input class="form-check-input" type="checkbox" id="silentNotify" name="silentNotify" value="true">
      <label class="form-check-label text-muted" for="silentNotify">ส่งแจ้งเตือนเข้า Discord แบบ Silent (ไม่แจ้งเตือนเด้ง)</label>
    </div>

    <button type="submit" id="submitBtn" class="btn btn-primary w-100 mt-2">Submit</button>
  </form>
</div>

<script>
  // --- Date & Time Logic ---
  const dateInput = document.getElementById('publishDate');
  const rushCheckbox = document.getElementById('rushJob');
  const dateHelper = document.getElementById('dateHelper');

  function formatDateTime(date) {
    const pad = n => n.toString().padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
  }

  function applyDateRules(isRush) {
    const now = new Date();
    
    if (isRush) {
      dateInput.min = formatDateTime(now);
      const defaultRushTime = new Date(now.getTime() + 60 * 60 * 1000); 
      dateInput.value = formatDateTime(defaultRushTime);
      dateHelper.innerText = "งานด่วน: สามารถเลือกเวลาได้ตามต้องการ";
      dateHelper.className = "text-danger";
    } else {
      const minDate = new Date(now);
      minDate.setDate(minDate.getDate() + 15);
      dateInput.min = formatDateTime(minDate);
      dateInput.value = ""; 
      dateHelper.innerText = "ต้องไม่เร็วกว่า 15 วันนับจากวันนี้";
      dateHelper.className = "text-muted";
    }
  }

  applyDateRules(false);

  rushCheckbox.addEventListener('change', function() {
    applyDateRules(this.checked);
  });

  // --- Form Submission Logic ---
  document.getElementById('prForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');
    const fileInput = document.getElementById('fileUpload');
    
    // ⚠️ REPLACE THIS WITH YOUR DEPLOYED GOOGLE APPS SCRIPT URL ⚠️
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwGfg9RQIJ0B4KK1qM3owtfs9HysAQkar_BPOxGAgAgwNQERspxENm6EeO7xDti9-E/exec'; 
    
    btn.disabled = true;
    btn.innerText = 'กำลังส่งข้อมูล... (หากมีไฟล์อาจใช้เวลาสักครู่)';
    alertBox.className = 'alert d-none';

    // File Size Check (35MB limit)
    if (fileInput.files.length > 0 && fileInput.files[0].size > 35 * 1024 * 1024) {
      alertBox.classList.remove('d-none');
      alertBox.classList.add('alert-danger');
      alertBox.innerText = 'ไฟล์มีขนาดใหญ่เกินไป (สูงสุด 35MB) กรุณาแนบเป็นลิงก์ Google Drive ในช่องด้านล่างแทน';
      btn.disabled = false;
      btn.innerText = 'Submit';
      return;
    }

    // Gather Form Data
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.platform = formData.getAll('platform'); 

    // Function to POST data to Google
    const sendData = async (payload) => {
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        alertBox.classList.remove('d-none');
        
        if(result.success) {
          alertBox.classList.add('alert-success');
          alertBox.innerText = result.message;
          document.getElementById('prForm').reset();
          applyDateRules(false); 
        } else {
          alertBox.classList.add('alert-danger');
          alertBox.innerText = result.message;
        }
      } catch (error) {
        alertBox.classList.remove('d-none');
        alertBox.classList.add('alert-danger');
        alertBox.innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่';
      } finally {
        btn.disabled = false;
        btn.innerText = 'Submit';
      }
    };

    // Convert file to Base64 (if attached) and send
    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const reader = new FileReader();
      
      reader.onload = function(event) {
        data.fileData = event.target.result; 
        data.fileName = file.name;
        data.mimeType = file.type;
        sendData(data); 
      };
      
      reader.readAsDataURL(file); 
    } else {
      sendData(data); 
    }
  });
</script>
</body>
</html>

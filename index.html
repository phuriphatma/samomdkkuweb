<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDKKU SAMO - PR Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f7fafc; padding: 2rem; font-family: sans-serif; }
    .form-container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
    .section-title { margin-top: 1.5rem; margin-bottom: 1rem; color: #2B6CB0; border-bottom: 2px solid #EDF2F7; padding-bottom: 5px; }
  </style>
</head>
<body>

<div class="form-container">
  <h2 class="text-center mb-4">สั่งงานและฝากประชาสัมพันธ์</h2>
  <div id="alertBox" class="alert d-none"></div>

  <form id="prForm">
    <h4 class="section-title">ข้อมูลผู้ส่งงาน</h4>
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">ฝ่าย (Department) *</label>
        <select name="department" class="form-select" required>
          <option value="" disabled selected>เลือกฝ่ายของคุณ</option>
          <option value="ฝ่ายบริหารองค์กร">ฝ่ายบริหารองค์กร</option>
          <option value="ฝ่ายดิจิทัลและสื่อสารองค์กร">ฝ่ายดิจิทัลและสื่อสารองค์กร</option>
          <option value="ฝ่ายกิจการภายใน">ฝ่ายกิจการภายใน</option>
          <option value="ฝ่ายกิจการภายนอก">ฝ่ายกิจการภายนอก</option>
          <option value="ฝ่ายกิจการมหาวิทยาลัย">ฝ่ายกิจการมหาวิทยาลัย</option>
          <option value="ฝ่ายวิชาการ">ฝ่ายวิชาการ</option>
          <option value="ฝ่ายยุทธศาสตร์และพัฒนาองค์กร">ฝ่ายยุทธศาสตร์และพัฒนาองค์กร</option>
          <option value="ฝ่ายคุณภาพขีวิตและสิ่งแวดล้อม">ฝ่ายคุณภาพขีวิตและสิ่งแวดล้อม</option>
          <option value="ฝ่ายเวชนิทัศน์">ฝ่ายเวชนิทัศน์</option>
          <option value="โครงการอื่นๆ">โครงการอื่นๆ</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">ช่องทางติดต่อ (Ig/Line) *</label>
        <input type="text" name="contact" class="form-control" placeholder="เช่น Ig: pukanpts" required>
      </div>
    </div>

    <h4 class="section-title">รายละเอียดงาน</h4>
    <div class="mb-3">
      <label class="form-label">ชื่องาน / Content *</label>
      <input type="text" name="content" class="form-control" required>
    </div>
    
    <div class="mb-3">
      <label class="form-label">Job Type *</label>
      <div>
        <input type="radio" name="jobType" value="New content" required> New content (ให้ทีม PR สร้างสื่อ) <br>
        <input type="radio" name="jobType" value="Ready to post" required> Ready to post
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Platform *</label>
      <div>
        <input type="checkbox" name="platform" value="Ig post"> Ig post
        <input type="checkbox" name="platform" value="Ig story" class="ms-2"> Ig story
        <input type="checkbox" name="platform" value="Facebook mdkkusamo" class="ms-2"> Facebook
        <input type="checkbox" name="platform" value="Line กลุ่มชั้นปี" class="ms-2"> Line กลุ่มชั้นปี
      </div>
    </div>

    <h4 class="section-title">กำหนดการ</h4>
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">วันที่ต้องการลงประชาสัมพันธ์ *</label>
        <input type="date" name="publishDate" id="publishDate" class="form-control" required>
        <small class="text-muted" id="dateHelper">ต้องไม่เร็วกว่า 15 วันนับจากวันนี้</small>
      </div>
      <div class="col-md-6 d-flex align-items-center mt-4">
        <input type="checkbox" name="rushJob" value="งานด่วน" id="rushJob" class="form-check-input me-2">
        <label for="rushJob" class="form-check-label text-danger fw-bold">งานด่วน (ใช้ได้ 1 ครั้ง/เดือน/ฝ่าย)</label>
      </div>
    </div>

    <h4 class="section-title">เนื้อหาและไฟล์แนบ</h4>
    <div class="mb-3">
      <label class="form-label">Brief</label>
      <textarea name="brief" class="form-control" rows="3" placeholder="แนวทางที่ต้องการ"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Caption</label>
      <textarea name="caption" class="form-control" rows="3"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">อัปโหลดไฟล์ (สูงสุด 35MB)</label>
      <input type="file" name="fileUpload" id="fileUpload" class="form-control">
      <small class="text-muted">หากไฟล์ใหญ่กว่า 35MB กรุณาแปะลิงก์ Google Drive ในช่อง Brief แทน</small>
    </div>

    <button type="submit" id="submitBtn" class="btn btn-primary w-100 mt-4">Submit</button>
  </form>
</div>

<script>
  // --- Date Logic (15 days vs 24 hours for rush job) ---
  const dateInput = document.getElementById('publishDate');
  const rushCheckbox = document.getElementById('rushJob');
  const dateHelper = document.getElementById('dateHelper');

  function setMinDate(daysToAdd) {
    const minDate = new Date();
    minDate.setDate(minDate.getDate() + daysToAdd);
    dateInput.min = minDate.toISOString().split('T')[0];
  }

  setMinDate(15); // Default minimum

  rushCheckbox.addEventListener('change', function() {
    if(this.checked) {
      setMinDate(1); 
      dateHelper.innerText = "งานด่วน: ต้องไม่เร็วกว่า 24 ชั่วโมง";
      dateHelper.className = "text-danger";
    } else {
      setMinDate(15);
      dateHelper.innerText = "ต้องไม่เร็วกว่า 15 วันนับจากวันนี้";
      dateHelper.className = "text-muted";
    }
  });

  // --- Form Submission Logic ---
  document.getElementById('prForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');
    const fileInput = document.getElementById('fileUpload');
    
    // ⚠️ REPLACE THIS WITH YOUR DEPLOYED GOOGLE APPS SCRIPT URL ⚠️
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzUPk7_rmkkdBkM87-FGw8wWHigu6H7_EBOggzN6kJUXSvkGnYQXW8JNoI_OPDaNxZr/exec'; 
    
    btn.disabled = true;
    btn.innerText = 'กำลังส่งข้อมูล... (หากมีไฟล์อาจใช้เวลาสักครู่)';
    alertBox.className = 'alert d-none';

    // File Size Check (35MB limit to prevent Google API crash)
    if (fileInput.files.length > 0 && fileInput.files[0].size > 35 * 1024 * 1024) {
      alertBox.classList.remove('d-none');
      alertBox.classList.add('alert-danger');
      alertBox.innerText = 'ไฟล์มีขนาดใหญ่เกินไป (สูงสุด 35MB) กรุณาแนบเป็นลิงก์ Google Drive ในช่อง Brief แทน';
      btn.disabled = false;
      btn.innerText = 'Submit';
      return;
    }

    // Gather Form Data
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.platform = formData.getAll('platform');

    // Function to POST data to Google
    const sendData = async (payload) => {
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          // text/plain prevents strict CORS preflight blocks from Google
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        alertBox.classList.remove('d-none');
        
        if(result.success) {
          alertBox.classList.add('alert-success');
          alertBox.innerText = result.message;
          document.getElementById('prForm').reset();
          setMinDate(15);
        } else {
          alertBox.classList.add('alert-danger');
          alertBox.innerText = result.message;
        }
      } catch (error) {
        alertBox.classList.remove('d-none');
        alertBox.classList.add('alert-danger');
        alertBox.innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่';
      } finally {
        btn.disabled = false;
        btn.innerText = 'Submit';
      }
    };

    // Convert file to Base64 (if file exists) then send
    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const reader = new FileReader();
      
      reader.onload = function(event) {
        data.fileData = event.target.result; 
        data.fileName = file.name;
        data.mimeType = file.type;
        sendData(data); 
      };
      
      reader.readAsDataURL(file); 
    } else {
      // No file attached, just send text
      sendData(data); 
    }
  });
</script>
</body>
</html>
